// ============================================================
// Photo classification — works in all browsers, no external APIs
// ============================================================
// Face-api.js model loader — runs once on first use

let faceApiReady = false;
const loadFaceApi = async () => {
  if (faceApiReady) return;
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(
      'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights'
    );
    faceApiReady = true;

  } catch(e) {
    console.log('[classify] face-api.js failed to load:', e.message);
  }
};

// ============================================================
// Classifier — face detection first, color fallback for rest
// ============================================================
const classifyImage = async (img) => {
  // ── Step 1: Load face-api model (cached after first load) ──
  await loadFaceApi();

  // ── Step 2: Face detection → extraoral ─────────────────────
  if (faceApiReady) {
    try {
      const detections = await faceapi.detectAllFaces(
        img, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.3 })
      );
      if (detections.length > 0) {
        console.log(`[classify] → EXTRAORAL (face, score=${detections[0].score.toFixed(2)})`);
        return { category: 'extraoral', isLateralCeph: false };
      }
    } catch(e) {
      console.log('[classify] face detection error:', e.message);
    }
  }

  // ── Step 3: Color analysis — xray vs intraoral ─────────────
  const c = document.createElement('canvas');
  const size = 120;
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  const { data } = ctx.getImageData(0, 0, size, size);

  let r = 0, g = 0, b = 0, count = 0;
  let toothPixels = 0, gumPixels = 0;

  for (let i = 0; i < data.length; i += 4) {
    const R = data[i], G = data[i+1], B = data[i+2];
    r += R; g += G; b += B; count++;
    const brightness = (R + G + B) / 3;
    const max = Math.max(R, G, B), min = Math.min(R, G, B);
    const sat = max === 0 ? 0 : (max - min) / max;
    if (brightness > 160 && sat < 0.25) toothPixels++;
    if (R > 130 && R > G * 1.2 && R > B * 1.15 && brightness > 60 && brightness < 230) gumPixels++;
  }

  r /= count; g /= count; b /= count;
  const avgRGB  = (r + g + b) / 3;
  const stdDev  = Math.sqrt(((r-avgRGB)**2 + (g-avgRGB)**2 + (b-avgRGB)**2) / 3);
  const dentalR = (toothPixels + gumPixels * 0.5) / count;

  console.log(`[classify] stdDev=${stdDev.toFixed(2)} r-b=${(r-b).toFixed(1)} dentalR=${dentalR.toFixed(3)}`);

  // Xray: neutral/cool channels
  if (stdDev < 14 && (r - b) < 15) {
    // Check if this is likely a lateral cephalogram: portrait orientation
    const isLateralCeph = img.height > img.width * 1.05;
    return { category: 'xray', isLateralCeph };
  }
  // Intraoral: significant dental pixel presence
  if (dentalR > 0.25) return { category: 'intraoral', isLateralCeph: false };
  // Fallback extraoral
  return { category: 'extraoral', isLateralCeph: false };
};

// ============================================================
// IndexedDB — stores case files (Firefox/Safari) + folder handle (Chrome/Edge)
// ============================================================
const DB_NAME = 'orthoboard';
const DB_VERSION = 2;
const idb = (() => {
  let dbPromise = null;
  const open = () => {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('cases'))    db.createObjectStore('cases',    { keyPath: 'id' });
        if (!db.objectStoreNames.contains('handles'))  db.createObjectStore('handles',  { keyPath: 'id' });
        if (!db.objectStoreNames.contains('autosave')) db.createObjectStore('autosave', { keyPath: 'id' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  };
  const tx = async (store, mode, fn) => {
    const db = await open();
    return new Promise((resolve, reject) => {
      const t = db.transaction(store, mode);
      const s = t.objectStore(store);
      const r = fn(s);
      t.oncomplete = () => resolve(r?.result ?? r);
      t.onerror = () => reject(t.error);
    });
  };
  return {
    putCase:    (c)  => tx('cases', 'readwrite', s => s.put(c)),
    getCase:    (id) => tx('cases', 'readonly',  s => s.get(id)),
    deleteCase: (id) => tx('cases', 'readwrite', s => s.delete(id)),
    listCases:  ()   => tx('cases', 'readonly',  s => s.getAll()),
    putHandle:  (h)  => tx('handles', 'readwrite', s => s.put(h)),
    getHandle:  (id) => tx('handles', 'readonly',  s => s.get(id)),
    putAutosave:    (a) => tx('autosave', 'readwrite', s => s.put(a)),
    getAutosave:    ()  => tx('autosave', 'readonly',  s => s.get('current')),
    deleteAutosave: ()  => tx('autosave', 'readwrite', s => s.delete('current')),
  };
})();

// ============================================================
// STL PARSER — binary + ASCII, returns Float32Array of vertices
// ============================================================
const parseSTL = (buffer) => {
  const isASCII = (() => {
    const arr = new Uint8Array(buffer, 0, Math.min(256, buffer.byteLength));
    for (let i = 0; i < arr.length; i++) { if (arr[i] > 127) return false; }
    return true;
  })();

  if (isASCII) {
    const text = new TextDecoder().decode(buffer);
    const verts = [];
    const re = /vertex\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)\s+([\d.eE+\-]+)/g;
    let m;
    while ((m = re.exec(text))) { verts.push(+m[1], +m[2], +m[3]); }
    return new Float32Array(verts);
  } else {
    const view = new DataView(buffer);
    const nTri = view.getUint32(80, true);
    const verts = new Float32Array(nTri * 9);
    for (let i = 0; i < nTri; i++) {
      const off = 84 + i * 50;
      for (let v = 0; v < 3; v++) {
        for (let c = 0; c < 3; c++) {
          verts[i * 9 + v * 3 + c] = view.getFloat32(off + 12 + v * 12 + c * 4, true);
        }
      }
    }
    return verts;
  }
};

const INDEX_FILE = 'orthoboard-index.json';
const readIndex = async (handle) => {
  try {
    const fh = await handle.getFileHandle(INDEX_FILE);
    const file = await fh.getFile();
    return JSON.parse(await file.text());
  } catch { return {}; }
};
const writeIndex = async (handle, index) => {
  try {
    const fh = await handle.getFileHandle(INDEX_FILE, { create: true });
    const w = await fh.createWritable();
    await w.write(JSON.stringify(index));
    await w.close();
  } catch(e) { console.warn('index write failed', e); }
};
const makeThumbnail = (src) => new Promise((resolve) => {
  if (!src) { resolve(null); return; }
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 80; c.height = 110;
    const ctx = c.getContext('2d');
    const ratio = img.width / img.height;
    const tr = 80 / 110;
    let sx = 0, sy = 0, sw = img.width, sh = img.height;
    if (ratio > tr) { sw = img.height * tr; sx = (img.width - sw) / 2; }
    else { sh = img.width / tr; sy = (img.height - sh) / 2; }
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 80, 110);
    resolve(c.toDataURL('image/jpeg', 0.5));
  };
  img.onerror = () => resolve(null);
  img.src = src;
});

// SPLASH SCREEN — shown once per session on app open
// ============================================================
function SplashScreen({ onDone }) {
  const ref = useRef(null);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;

    const icon    = el.querySelector('#sp-icon');
    const title   = el.querySelector('#sp-title');
    const subRow  = el.querySelector('#sp-sub-row');
    const overlay = el;

    // Reset
    icon.style.cssText   = 'opacity:0;transform:scale(0.5) rotate(-20deg);transition:none;';
    title.style.cssText  = "font-family:'Geist',system-ui,-apple-system,sans-serif;font-size:46px;font-weight:600;letter-spacing:-0.03em;line-height:1;color:#0f172a;margin:0;padding:0;opacity:0;transform:translateX(-12px);transition:none;";
    subRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:6px;opacity:0;transform:translateX(-8px);transition:none;';

    const t = (ms, fn) => setTimeout(fn, ms);

    // Logo spring in
    t(180, () => {
      icon.style.transition = 'opacity 0.5s ease, transform 0.7s cubic-bezier(0.34,1.56,0.64,1)';
      icon.style.opacity = '1';
      icon.style.transform = 'scale(1) rotate(0deg)';
    });

    // Title slides in
    t(580, () => {
      title.style.transition = 'opacity 0.45s ease, transform 0.45s cubic-bezier(0.22,1,0.36,1)';
      title.style.opacity = '1';
      title.style.transform = 'translateX(0)';
    });

    // Subtitle slides in
    t(760, () => {
      subRow.style.transition = 'opacity 0.4s ease, transform 0.4s cubic-bezier(0.22,1,0.36,1)';
      subRow.style.opacity = '1';
      subRow.style.transform = 'translateX(0)';
    });

    // Fade out + done
    t(2000, () => {
      overlay.style.transition = 'opacity 0.5s ease';
      overlay.style.opacity = '0';
    });
    t(2520, () => onDone());
  }, []);

  return (
    <div ref={ref} style={{
      position: 'fixed', inset: 0, zIndex: 999,
      background: '#ffffff',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: "'Geist', system-ui, -apple-system, sans-serif",
    }}>
      {/* Subtle ambient blobs */}
      <div style={{ position:'absolute', top:'-10%', right:'-10%', width:500, height:500,
        background:'radial-gradient(circle,rgba(57,191,240,0.08) 0%,transparent 65%)',
        pointerEvents:'none' }} />

function App() {
  const [showSplash, setShowSplash] = useState(() => !sessionStorage.getItem('orthoboard-splash-seen'));
  const hideSplash = () => { sessionStorage.setItem('orthoboard-splash-seen', '1'); setShowSplash(false); };
  const [dark, setDark] = useState(() => {
    const saved = localStorage.getItem('orthoboard-theme');
    if (saved) return saved === 'dark';
    return false; // default: light mode
  });
  useEffect(() => {
    document.body.classList.toggle('dark', dark);
    document.body.classList.toggle('light', !dark);
    localStorage.setItem('orthoboard-theme', dark ? 'dark' : 'light');
  }, [dark]);

  const [state, setState] = useState({
    photos: [], strokes: [], lines: [], measures: [], notes: [],
    patientInfo: { age: '', sex: '', chiefComplaint: '', medicalHistory: '', notes: '' },
    stlModels: [],
  });
  const historyRef = useRef([]);
  const futureRef  = useRef([]);
  const [isDirty, setIsDirty] = useState(false);
  const [unsavedModal, setUnsavedModal] = useState(null);
  const [clearModal, setClearModal] = useState(false);
  const [duplicateModal, setDuplicateModal] = useState(null);
  const [nameModal, setNameModal] = useState(null); // { onAfterSave } // { onAfterSave } | null

  const updateState = (updater, recordHistory = true) => {
    if (recordHistory) {
      historyRef.current.push(state);
      if (historyRef.current.length > 50) historyRef.current.shift();
      futureRef.current = [];
      setIsDirty(true);
    }
    setState(prev => typeof updater === 'function' ? updater(prev) : updater);
  };

  const undo = () => {
    if (historyRef.current.length === 0) return;
    futureRef.current.push(state);
    const prev = historyRef.current.pop();
    setState(prev);
  };

  useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
        e.preventDefault();
        undo();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [state]);

  const { photos, strokes, lines, measures, notes } = state;
  const stlModels = state.stlModels || [];
  const patientInfo = state.patientInfo || { age: '', sex: '', chiefComplaint: '', medicalHistory: '', notes: '' };

  const setPatientInfo = (patch) => setState(s => ({
    ...s, patientInfo: { ...(s.patientInfo || {}), ...patch },
  }));
  const setStlModels = (u) => updateState(s => ({ ...s, stlModels: typeof u === 'function' ? u(s.stlModels || []) : u }));

  const setPhotos   = (u) => updateState(s => ({ ...s, photos:   typeof u === 'function' ? u(s.photos)   : u }));
  const setStrokes  = (u) => updateState(s => ({ ...s, strokes:  typeof u === 'function' ? u(s.strokes)  : u }));
  const setLines    = (u) => updateState(s => ({ ...s, lines:    typeof u === 'function' ? u(s.lines)    : u }));
  const setMeasures = (u) => updateState(s => ({ ...s, measures: typeof u === 'function' ? u(s.measures) : u }));
  const setNotes    = (u) => updateState(s => ({ ...s, notes:    typeof u === 'function' ? u(s.notes)    : u }));

  const setPhotosLive   = (u) => setState(s => ({ ...s, photos:   typeof u === 'function' ? u(s.photos)   : u }));
  const setLinesLive    = (u) => setState(s => ({ ...s, lines:    typeof u === 'function' ? u(s.lines)    : u }));
  const setNotesLive    = (u) => setState(s => ({ ...s, notes:    typeof u === 'function' ? u(s.notes)    : u }));
  const setStrokesLive  = (u) => setState(s => ({ ...s, strokes:  typeof u === 'function' ? u(s.strokes)  : u }));
  const setMeasuresLive = (u) => setState(s => ({ ...s, measures: typeof u === 'function' ? u(s.measures) : u }));

  const [tool, setTool]         = useState('pan');
  const [strokeWidth, setStrokeWidth] = useState(2);
  const [viewport, setViewport] = useState({ x: 200, y: 100, zoom: 0.5 });
  const [showDiagPanel, setShowDiagPanel] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [selectedPhotoId, setSelectedPhotoId] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [stlLightbox, setStlLightbox] = useState(null);
  const [cropTarget, setCropTarget] = useState(null);
  const [contextMenu, setContextMenu] = useState(null);
  const [cephModal, setCephModal] = useState(null);
  const [previewRotation, setPreviewRotation] = useState(0);
  const [caseName, setCaseName] = useState('New Case');
  const [showDashboard, setShowDashboard] = useState(false);
  const [folderHandle, setFolderHandle] = useState(null);
  const [currentCaseId, setCurrentCaseId] = useState(null); // for IDB-backed cases
  const [originalCaseName, setOriginalCaseName] = useState(null); // name as loaded — null for fresh cases
  const fileInputRef = useRef(null);
  const loadInputRef = useRef(null);

  // ── Restore previously chosen folder on Chrome/Edge ──────
  const [pendingFolderHandle, setPendingFolderHandle] = useState(null);
  useEffect(() => {
    (async () => {
      if (!hasFileSystemAccess) return;
      try {
        const stored = await idb.getHandle('main');
        if (stored?.handle) {
          const perm = await stored.handle.queryPermission({ mode: 'readwrite' });
          if (perm === 'granted') {
            setFolderHandle(stored.handle);
          } else {
            // Permission needs a user gesture to re-grant — store it, show reconnect banner
            setPendingFolderHandle(stored.handle);
          }
        }
      } catch {}
    })();
  }, []);

  // ── Build the JSON payload ───────────────────────────────
  const buildPayload = () => ({
    version: 1,
    caseName,
    savedAt: new Date().toISOString(),
    state,
  });

  // ── AUTOSAVE: snapshot to IndexedDB every 30s while dirty ──
  const [recoveryAvailable, setRecoveryAvailable] = useState(null);
  const [autosaveStatus, setAutosaveStatus] = useState(null); // null | 'saving' | 'saved'

  useEffect(() => {
    if (!isDirty) return;
    const id = setInterval(async () => {
      try {
        setAutosaveStatus('saving');
        await idb.putAutosave({
          id: 'current',
          caseName,
          savedAt: new Date().toISOString(),
          payload: buildPayload(),
        });
        setAutosaveStatus('saved');
        setTimeout(() => setAutosaveStatus(null), 1500);
      } catch (e) { console.warn('Autosave failed:', e); setAutosaveStatus(null); }
    }, 30000);
    return () => clearInterval(id);
  }, [isDirty, caseName, state]);

  // Save snapshot before tab/window close
  useEffect(() => {
    const onBeforeUnload = () => {
      if (!isDirty) return;
      try {
        idb.putAutosave({
          id: 'current',
          caseName,
          savedAt: new Date().toISOString(),
          payload: buildPayload(),
        });
      } catch {}
    };
    window.addEventListener('beforeunload', onBeforeUnload);
    return () => window.removeEventListener('beforeunload', onBeforeUnload);
  }, [isDirty, caseName, state]);

  // Check for autosave recovery on first load
  useEffect(() => {
    (async () => {
      try {
        const snap = await idb.getAutosave();
        if (snap?.payload) setRecoveryAvailable(snap);
      } catch {}
    })();
  }, []);

  // ── SAVE STATE ──────────────────────────────────────────
  const [saveStatus, setSaveStatus] = useState(null); // null | 'saving' | 'saved' | 'error'
  const [showFirstSaveModal, setShowFirstSaveModal] = useState(false);

  // Internal: actually write the file. Optional `nameOverride` skips closure issues
  // when caller has just called setCaseName (state hasn't propagated yet).
  const writeCaseFile = async (nameOverride) => {
    const effectiveName = nameOverride || caseName;
    const payload = { ...buildPayload(), caseName: effectiveName };
    const safe = effectiveName.replace(/[^a-z0-9]+/gi, '_').toLowerCase() || 'case';
    const filename = `${safe}.orthoboard.json`;
    console.log('[Save] folderHandle:', !!folderHandle, '| name:', effectiveName, '| filename:', filename);

    const renamed = originalCaseName !== null
                    && effectiveName.trim().toLowerCase() !== originalCaseName.trim().toLowerCase();

    if (folderHandle) {
      console.log('[Save] Writing to folder...');
      const fileHandle = await folderHandle.getFileHandle(filename, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(payload));
      await writable.close();
      console.log('[Save] File written OK, updating index...');

      const photos = state.photos || [];
      const byCat = (cat) => photos.find(p => p.category === cat)?.src || null;
      const [t0, t1, t2] = await Promise.all([
        makeThumbnail(byCat('extraoral')),
        makeThumbnail(byCat('intraoral')),
        makeThumbnail(byCat('xray')),
      ]);

      const index = await readIndex(folderHandle);
      index[filename] = {
        name: effectiveName,
        savedAt: payload.savedAt,
        photoCount: photos.length,
        peekPhotos: [t0, t1, t2],
        chiefComplaint: state.patientInfo?.chiefComplaint || '',
      };
      await writeIndex(folderHandle, index);
      return;
    }

    if (!hasFileSystemAccess) {
      const photos = state.photos || [];
      const byCat = (cat) => photos.find(p => p.category === cat)?.src || null;
      const [t0, t1, t2] = await Promise.all([
        makeThumbnail(byCat('extraoral')),
        makeThumbnail(byCat('intraoral')),
        makeThumbnail(byCat('xray')),
      ]);
      const id = (renamed ? null : currentCaseId) || crypto.randomUUID();
      await idb.putCase({
        id, name: effectiveName, savedAt: payload.savedAt, payload,
        peekPhotos: [t0, t1, t2],
        chiefComplaint: state.patientInfo?.chiefComplaint || '',
      });
      setCurrentCaseId(id);
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${safe}_${new Date().toISOString().slice(0,10)}.orthoboard.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
  };

  // ── SAVE: triggered by user ─────────────────────────────
  const saveCase = async (onAfterSave) => {
    // Chrome/Edge with no folder → first-time modal
    if (hasFileSystemAccess && !folderHandle) {
      setShowFirstSaveModal(true);
      return;
    }

    // If still using the default name on a fresh case, ask for a name
    const isDefaultName = caseName.trim().toLowerCase() === 'new case';
    if (isDefaultName && originalCaseName === null) {
      setNameModal({ onAfterSave });
      return;
    }

    // Skip duplicate check if saving back to same file
    const sameAsOriginal = originalCaseName !== null
                           && caseName.trim().toLowerCase() === originalCaseName.trim().toLowerCase();

    let exists = false;
    if (!sameAsOriginal && currentCaseId === null) {
      const safe = caseName.replace(/[^a-z0-9]+/gi, '_').toLowerCase() || 'case';
      const filename = `${safe}.orthoboard.json`;
      if (folderHandle) {
        try { const index = await readIndex(folderHandle); exists = filename in index; } catch {}
      } else if (!hasFileSystemAccess) {
        try { const all = await idb.listCases(); exists = all.some(c => c.name.toLowerCase() === caseName.toLowerCase()); } catch {}
      }
    }

    if (exists) { setDuplicateModal({ onAfterSave }); return; }

    await runSave();
    setOriginalCaseName(caseName);
    if (onAfterSave) onAfterSave();
  };

  const runSave = async (nameOverride) => {
    setSaveStatus('saving');
    try {
      await writeCaseFile(nameOverride);
      setIsDirty(false);
      try { await idb.deleteAutosave(); } catch {}
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(null), 1200);
    } catch (err) {
      console.error('Save failed:', err);
      alert('Save failed: ' + err.name + ' — ' + err.message);
      setSaveStatus('error');
      setTimeout(() => setSaveStatus(null), 2500);
    }
  };

  // First-save modal: choose folder then save
  const chooseFolderThenSave = async () => {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      await idb.putHandle({ id: 'main', handle });
      setFolderHandle(handle);
      setShowFirstSaveModal(false);
      // Tiny delay so state updates flush before runSave reads folderHandle
      setTimeout(() => {
        // Use the handle directly since state update may not be reflected yet
        (async () => {
          setSaveStatus('saving');
          try {
            const payload = buildPayload();
            const safe = caseName.replace(/[^a-z0-9]+/gi, '_').toLowerCase() || 'case';
            const filename = `${safe}.orthoboard.json`;
            const fileHandle = await handle.getFileHandle(filename, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify(payload));
            await writable.close();
            setSaveStatus('saved');
            setTimeout(() => setSaveStatus(null), 1200);
          } catch (err) {
            setSaveStatus('error');
            setTimeout(() => setSaveStatus(null), 2500);
          }
        })();
      }, 50);
    } catch {
      // user cancelled folder picker — do nothing
    }
  };

  // ── LOAD: from JSON object (used by both paths) ──────────
  const loadFromPayload = (data, idForIDB = null) => {
    if (!data?.state) { alert('Invalid case file.'); return; }
    setState(data.state);
    if (data.caseName) setCaseName(data.caseName);
    setCurrentCaseId(idForIDB);
    setOriginalCaseName(data.caseName || null);
    historyRef.current = [];
    futureRef.current = [];
    setIsDirty(false);
    setSelectedPhotoId(null);
    setShowDashboard(false);
  };

  // ── LOAD: from File object ───────────────────────────────
  const loadCase = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try { loadFromPayload(JSON.parse(e.target.result)); }
      catch { alert('Could not read this file.'); }
    };
    reader.readAsText(file);
  };

  // ── New case (clears state, hides dashboard) ─────────────
  const newCase = () => {
    setState({ photos: [], strokes: [], lines: [], measures: [], notes: [], stlModels: [],
               patientInfo: { age: '', sex: '', chiefComplaint: '', medicalHistory: '', notes: '' } });
    setCaseName('New Case');
    setCurrentCaseId(null);
    setOriginalCaseName(null);
    historyRef.current = [];
    futureRef.current = [];
    setIsDirty(false);
    setSelectedPhotoId(null);
    setShowDashboard(false);
  };

  const guardNavigation = (onProceed) => {
    if (isDirty) { setUnsavedModal({ onProceed }); return; }
    onProceed();
  };

  const handleFiles = async (files) => {
    // Handle STL files
    const stlFiles = [...files].filter(f => f.name.toLowerCase().endsWith('.stl'));
    if (stlFiles.length > 0) {
      const newModels = await Promise.all(stlFiles.map(async file => {
        const buffer = await file.arrayBuffer();
        const verts = parseSTL(buffer);
        // Compute bounding box for centering
        let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity,minZ=Infinity,maxZ=-Infinity;
        for (let i = 0; i < verts.length; i+=3) {
          minX=Math.min(minX,verts[i]);   maxX=Math.max(maxX,verts[i]);
          minY=Math.min(minY,verts[i+1]); maxY=Math.max(maxY,verts[i+1]);
          minZ=Math.min(minZ,verts[i+2]); maxZ=Math.max(maxZ,verts[i+2]);
        }
        return {
          id: crypto.randomUUID(),
          name: file.name.replace(/\.stl$/i, ''),
          verts: Array.from(verts), // store as plain array for JSON serialization
          bbox: { minX,maxX,minY,maxY,minZ,maxZ },
          x: 100, y: 100, w: 320, h: 320,
          color: '#9ca3af',
          calibration: null, // { px, mm } set by user
        };
      }));
      setStlModels(prev => [...prev, ...newModels]);
    }

    const newPhotos = [];
    // Classify all files in parallel — Promise.all for speed
    await Promise.all([...files].filter(f => f.type.startsWith('image/')).map(async file => {
      const src = await new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(file);
      });
      const img = await new Promise(res => {
        const i = new Image();
        i.onload = () => res(i);
        i.src = src;
      });
      const result = await classifyImage(img);
      newPhotos.push({
        id: crypto.randomUUID(),
        src,
        category: result.category,
        isLateralCeph: result.isLateralCeph,
        cephResults: null, // populated after Pixel Ceph analysis
        ratio: img.width / img.height,
        rotation: 0, flipH: false, flipV: false,
        diagnostics: [],
      });
    }));
    setPhotos(prev => {
      // Merge prev + new, then re-layout everything from scratch
      const all = [...prev, ...newPhotos.map(p => ({
        ...p, w: PHOTO_W, h: PHOTO_W / (p.ratio || 1)
      }))];

      const PHOTOS_PER_COL = 3;
      const CAT_GAP        = 60;
      const CELL            = PHOTO_W; // square cell size

      const grouped = { extraoral: [], intraoral: [], xray: [] };
      all.forEach(p => grouped[p.category]?.push(p));

      const catOrder = ['extraoral', 'intraoral', 'xray'];
      const positioned = [];
      let baseX = 0;

      catOrder.forEach(cat => {
        const items = grouped[cat];
        if (items.length === 0) return;
        const numCols = Math.ceil(items.length / PHOTOS_PER_COL);
        items.forEach((p, i) => {
          const col = Math.floor(i / PHOTOS_PER_COL);
          const row = i % PHOTOS_PER_COL;
          const ratio = p.ratio || 1;
          // Fit photo within CELL × CELL — constrain whichever dimension is larger
          let w, h;
          if (ratio >= 1) {
            // landscape or square — constrain width
            w = CELL;
            h = CELL / ratio;
          } else {
            // portrait — constrain height
            h = CELL;
            w = CELL * ratio;
          }
          positioned.push({
            ...p,
            x: baseX + col * (CELL + GAP),
            y: row * (CELL + GAP),
            w, h,
          });
        });
        baseX += numCols * (CELL + GAP) + CAT_GAP;
      });

      return positioned;
    });
  };

  const screenToWorld = (pt) => ({
    x: (pt.x - viewport.x) / viewport.zoom,
    y: (pt.y - viewport.y) / viewport.zoom,
  });

  const clearAll = () => setClearModal(true);

  const fitView = () => {
    if (photos.length === 0) {
      setViewport({ x: window.innerWidth / 2, y: window.innerHeight / 2, zoom: 1 });
      return;
    }
    const minX = Math.min(...photos.map(p => p.x));
    const maxX = Math.max(...photos.map(p => p.x + p.w));
    const minY = Math.min(...photos.map(p => p.y));
    const maxY = Math.max(...photos.map(p => p.y + p.h));
    const w = maxX - minX, h = maxY - minY;
    const zoom = Math.min((window.innerWidth - 400) / w, (window.innerHeight - 100) / h, 1) * 0.9;
    setViewport({
      x: window.innerWidth / 2 - (minX + w / 2) * zoom,
      y: window.innerHeight / 2 - (minY + h / 2) * zoom,
      zoom,
    });
  };

  const updatePhoto = (id, patch, recordHistory = true) => {
    const updater = prev => prev.map(p => p.id === id ? { ...p, ...patch } : p);
    if (recordHistory) setPhotos(updater);
    else setPhotosLive(updater);
  };

  const flipH = (id) => { const p = photos.find(x => x.id === id); if (p) updatePhoto(id, { flipH: !p.flipH }); };
  const flipV = (id) => { const p = photos.find(x => x.id === id); if (p) updatePhoto(id, { flipV: !p.flipV }); };
  const rotateBy = (id, deg) => { const p = photos.find(x => x.id === id); if (p) updatePhoto(id, { rotation: (p.rotation + deg) % 360 }); };

  // Bake a precise degree rotation + auto-crop into the image src
  const rotateDegrees = useCallback((id, angleDeg) => {
    const p = photos.find(x => x.id === id);
    if (!p) return;
    const img = new Image();
    img.onload = () => {
      const rad = angleDeg * Math.PI / 180;
      const W = img.width, H = img.height;

      // Max inscribed rectangle after rotation (auto-crop formula)
      // Works for any angle, keeps as much of the image as possible
      const absRad = Math.abs(rad);
      const sinA = Math.abs(Math.sin(absRad));
      const cosA = Math.abs(Math.cos(absRad));

      let cropW, cropH;
      if (W >= H) {
        // Landscape or square
        const scale = W / (H * sinA + W * cosA);
        cropW = scale * W;
        cropH = scale * H;
      } else {
        // Portrait
        const scale = H / (W * sinA + H * cosA);
        cropW = scale * W;
        cropH = scale * H;
      }
      cropW = Math.floor(cropW);
      cropH = Math.floor(cropH);

      // Draw rotated image on canvas, then crop center
      const c = document.createElement('canvas');
      c.width = cropW; c.height = cropH;
      const ctx = c.getContext('2d');
      ctx.translate(cropW / 2, cropH / 2);
      ctx.rotate(rad);
      ctx.drawImage(img, -W / 2, -H / 2);

      const newSrc = c.toDataURL('image/jpeg', 0.92);
      const newRatio = cropW / cropH;
      const newH = p.w / newRatio;
      updatePhoto(id, { src: newSrc, ratio: newRatio, h: newH, rotation: 0, flipH: false, flipV: false });
    };
    img.src = p.src;
  }, [photos]);
  const handleCropDone = (id, croppedSrc, newRatio) => {
    const p = photos.find(x => x.id === id);
    if (!p) return;
    const newH = p.w / newRatio;
    updatePhoto(id, { src: croppedSrc, ratio: newRatio, h: newH, rotation: 0, flipH: false, flipV: false });
    setCropTarget(null);
  };
  const deletePhoto = (id) => {
    setPhotos(prev => prev.filter(p => p.id !== id));
    setSelectedPhotoId(null);
  };

  // ── Lateral ceph handlers ─────────────────────────────────
  const toggleLateralCeph = (id) => {
    const p = photos.find(x => x.id === id);
    if (p) updatePhoto(id, { isLateralCeph: !p.isLateralCeph });
  };

  const openCephAnalysis = (photo) => {
    setCephModal(photo);
    setContextMenu(null);
  };

  // Listen for results coming back from Pixel Ceph via postMessage
  useEffect(() => {
    const onMessage = (e) => {
      // Accept messages from any Pixel Ceph deployment (paid or free)
      const validOrigins = ['orthotimes.net', 'pixelceph.web.app', 'pixelceph.firebaseapp.com'];
      if (!validOrigins.some(o => e.origin.includes(o))) return;
      const data = e.data;
      if (!data || data.type !== 'ceph-results') return;
      if (!cephModal) return;

      // Save results onto the photo
      updatePhoto(cephModal.id, {
        cephResults: {
          measurements: data.measurements || {},
          pdfDataUrl: data.pdfDataUrl || null,
          analyzedAt: new Date().toISOString(),
        }
      });

      // Drop a structured ceph note next to the xray
      setNotes(prev => [...prev, {
        id: crypto.randomUUID(),
        x: cephModal.x + cephModal.w + 30,
        y: cephModal.y,
        text: '🦴 Ceph Analysis', // fallback plain text
        isCephNote: true,
        cephData: {
          mode: data.mode || 'Analysis',
          patientName: data.patientName || '',
          measurements: data.measurements || {},
          analyzedAt: new Date().toLocaleString(),
        },
        cephPdfUrl: data.pdfDataUrl || null,
      }]);

      setCephModal(null);
    };
    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, [cephModal, photos]);

  const addDiagnosticToPhoto = (photoId, toolDef) => {
    const newItem = {
      id: crypto.randomUUID(),
      type: toolDef.id,
      ...(toolDef.id === 'vline'  && { x: 0.5, y1: 0.1, y2: 0.9 }),
      ...(toolDef.id === 'hline'  && { y: 0.5, x1: 0.1, x2: 0.9 }),
      ...(toolDef.id === 'curve'  && { points: [
        { x: 0.2, y: 0.45 },
        { x: 0.4, y: 0.55 },
        { x: 0.6, y: 0.55 },
        { x: 0.8, y: 0.45 },
      ] }),
      ...(toolDef.id === 'smileline' && { points: [
        { x: 0.2, y: 0.55 },
        { x: 0.4, y: 0.65 },
        { x: 0.6, y: 0.65 },
        { x: 0.8, y: 0.55 },
      ] }),
      ...(toolDef.id === 'teeth'  && {
        x: 0.1, y: 0.25, w: 0.8, h: 0.5,
        ratios: [0.382, 0.618, 1.0, 1.0, 0.618, 0.382],
      }),
      ...(toolDef.id === 'fifths' && {
        // Simple box that contains 5 equal vertical divisions
        x: 0.15, y: 0.35, w: 0.7, h: 0.18,
      }),
      ...(toolDef.id === 'thirds' && {
        // Simple box that contains 3 equal horizontal divisions
        x: 0.3, y: 0.15, w: 0.4, h: 0.7,
      }),
      ...(toolDef.id === 'angle'  && {
        apex: { x: 0.5, y: 0.6 },
        p1:   { x: 0.25, y: 0.3 },
        p2:   { x: 0.75, y: 0.3 },
      }),
      color: '#dc2626',
      strokeWidth: 2,
    };
    setPhotos(prev => prev.map(p => p.id === photoId
      ? { ...p, diagnostics: [...(p.diagnostics || []), newItem] }
      : p));
  };

  const updatePhotoDiagnostic = (photoId, diagId, patch, recordHistory = false) => {
    const updater = prev => prev.map(p => {
      if (p.id !== photoId) return p;
      return { ...p, diagnostics: p.diagnostics.map(d => d.id === diagId ? { ...d, ...patch } : d) };
    });
    if (recordHistory) setPhotos(updater);
    else setPhotosLive(updater);
  };

  const deletePhotoDiagnostic = (photoId, diagId) => {
    setPhotos(prev => prev.map(p => p.id === photoId
      ? { ...p, diagnostics: p.diagnostics.filter(d => d.id !== diagId) }
      : p));
  };

  const selectedPhoto = photos.find(p => p.id === selectedPhotoId);

  // Whiteboard drag-drop
  const [dropOverlay, setDropOverlay] = useState(false);
  const dragCounterRef = useRef(0);
  const onDropFiles = (e) => {
    e.preventDefault();
    dragCounterRef.current = 0;
    setDropOverlay(false);
    const files = [...e.dataTransfer.files];
    const images = files.filter(f => f.type.startsWith('image/'));
    const stls = files.filter(f => f.name.toLowerCase().endsWith('.stl'));
    const json = files.find(f => f.name.endsWith('.json'));
    if (images.length > 0 || stls.length > 0) handleFiles([...images, ...stls]);
    if (json) loadCase(json);
  };

  return (
    <ThemeContext.Provider value={{ dark, setDark }}>
      {showSplash && <SplashScreen onDone={hideSplash} />}
      <div className={`fixed inset-0 overflow-hidden ${dark ? 'bg-neutral-950' : 'bg-stone-50'}`}
           onDragEnter={(e) => { e.preventDefault(); dragCounterRef.current++; if (e.dataTransfer.types.includes('Files')) setDropOverlay(true); }}
           onDragLeave={() => { dragCounterRef.current--; if (dragCounterRef.current <= 0) { dragCounterRef.current = 0; setDropOverlay(false); } }}
           onDragOver={(e) => { e.preventDefault(); }}
           onDrop={onDropFiles}>
        {dropOverlay && (
          <div className={`absolute inset-0 z-[55] pointer-events-none flex items-center justify-center
                          backdrop-blur-sm border-4 border-dashed rounded-2xl m-3
                          ${dark ? 'bg-amber-500/10 border-amber-400/60' : 'bg-amber-100/60 border-amber-400'}`}>
            <div className={`px-6 py-4 rounded-xl shadow-xl text-base font-medium
                            ${dark ? 'bg-neutral-900 text-neutral-100' : 'bg-white text-neutral-900'}`}>
              Drop photos or a case file here
            </div>
          </div>
        )}
        {showDashboard && (
          <Dashboard
            folderHandle={folderHandle}
            pendingFolderHandle={pendingFolderHandle}
            onChooseFolder={async () => {
              try {
                const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                await idb.putHandle({ id: 'main', handle });
                setFolderHandle(handle);
                setPendingFolderHandle(null);
              } catch (err) {
                if (err.name !== 'AbortError') {
                  console.error('Folder picker error:', err);
                  alert('Could not connect folder: ' + err.message);
                }
              }
            }}
            onReconnectFolder={async () => {
              try {
                const perm = await pendingFolderHandle.requestPermission({ mode: 'readwrite' });
                if (perm === 'granted') {
                  setFolderHandle(pendingFolderHandle);
                  setPendingFolderHandle(null);
                }
              } catch {}
            }}
            onForgetFolder={async () => {
              await idb.putHandle({ id: 'main', handle: null });
              setFolderHandle(null);
              setPendingFolderHandle(null);
            }}
            onOpenCase={loadFromPayload}
            onLoadFile={loadCase}
            onNewCase={newCase}
            recoveryAvailable={recoveryAvailable}
            onRecover={() => {
              loadFromPayload(recoveryAvailable.payload);
              setRecoveryAvailable(null);
              idb.deleteAutosave().catch(() => {});
            }}
            onDismissRecovery={() => {
              setRecoveryAvailable(null);
              idb.deleteAutosave().catch(() => {});
            }}
          />
        )}
        {saveStatus && (
          <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm">
            <div className={`rounded-2xl px-8 py-6 shadow-2xl flex items-center gap-4 min-w-[280px]
                            ${dark ? 'bg-neutral-900 border border-neutral-800'
                                   : 'bg-white border border-neutral-200'}`}>
              {saveStatus === 'saving' && (
                <>
                  <div className="w-6 h-6 rounded-full border-2 border-amber-400 border-t-transparent animate-spin" />
                  <div>
                    <div className={`text-sm font-medium ${dark ? 'text-neutral-100' : 'text-neutral-900'}`}>
                      Saving…
                    </div>
                    <div className={`text-xs mt-0.5 ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>
                      Please don't close this window.
                    </div>
                  </div>
                </>
              )}
              {saveStatus === 'saved' && (
                <>
                  <div className="w-7 h-7 rounded-full bg-emerald-500 text-white flex items-center justify-center">
                    <IconCheck size={16} />
                  </div>
                  <div className={`text-sm font-medium ${dark ? 'text-neutral-100' : 'text-neutral-900'}`}>
                    Saved
                  </div>
                </>
              )}
              {saveStatus === 'error' && (
                <>
                  <div className="w-7 h-7 rounded-full bg-red-500 text-white flex items-center justify-center">
                    <IconX size={16} />
                  </div>
                  <div className={`text-sm font-medium ${dark ? 'text-neutral-100' : 'text-neutral-900'}`}>
                    Could not save. Please try again.
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* Autosave indicator — small, bottom-right corner */}
        {autosaveStatus && !saveStatus && (
          <div className={`fixed bottom-4 right-4 z-[55] px-3 py-2 rounded-lg shadow-md flex items-center gap-2 text-xs font-medium
                          ${dark ? 'bg-neutral-900 border border-neutral-800 text-neutral-300'
                                 : 'bg-white border border-neutral-200 text-neutral-600'}`}>
            {autosaveStatus === 'saving'
              ? <><div className="w-3 h-3 rounded-full border-[1.5px] border-emerald-500 border-t-transparent animate-spin" /> Auto-saving…</>
              : <><div className="w-2 h-2 rounded-full bg-emerald-500" /> Auto-saved</>}
          </div>
        )}

        {showFirstSaveModal && (
          <FirstSaveModal
            onChoose={chooseFolderThenSave}
            onCancel={() => setShowFirstSaveModal(false)}
          />
        )}
        {unsavedModal && (
          <UnsavedModal
            caseName={caseName}
            onSave={() => { const p = unsavedModal.onProceed; setUnsavedModal(null); saveCase(p); }}
            onDiscard={() => { const p = unsavedModal.onProceed; setUnsavedModal(null); p(); }}
            onCancel={() => setUnsavedModal(null)}
          />
        )}
        {clearModal && (
          <ConfirmModal
            title="Clear whiteboard?"
            message="All photos, drawings, and notes will be removed. This cannot be undone."
            confirmLabel="Clear"
            danger
            onConfirm={() => { setClearModal(false); updateState({ photos: [], strokes: [], lines: [], measures: [], notes: [] }); setSelectedPhotoId(null); }}
            onCancel={() => setClearModal(false)}
          />
        )}
        {duplicateModal && (
          <DuplicateModal
            currentName={caseName}
            onReplace={async () => {
              const cb = duplicateModal.onAfterSave;
              setDuplicateModal(null);
              await runSave();
              setOriginalCaseName(caseName);
              if (cb) cb();
            }}
            onRename={async (newName) => {
              const cb = duplicateModal.onAfterSave;
              setDuplicateModal(null);
              setCaseName(newName);
              await runSave(newName);
              setOriginalCaseName(newName);
              if (cb) cb();
            }}
            onCancel={() => setDuplicateModal(null)}
          />
        )}
        {nameModal && (
          <NameCaseModal
            onConfirm={async (newName) => {
              const cb = nameModal.onAfterSave;
              setNameModal(null);
              setCaseName(newName);
              await runSave(newName);
              setOriginalCaseName(newName);
              if (cb) cb();
            }}
            onCancel={() => setNameModal(null)}
          />
        )}
        <Canvas
          photos={photos} setPhotos={setPhotos} setPhotosLive={setPhotosLive}
          strokes={strokes} setStrokes={setStrokes} setStrokesLive={setStrokesLive}
          lines={lines} setLines={setLines} setLinesLive={setLinesLive}
          measures={measures} setMeasures={setMeasures} setMeasuresLive={setMeasuresLive}
          notes={notes} setNotes={setNotes} setNotesLive={setNotesLive}
          stlModels={stlModels} setStlModels={setStlModels}
          tool={tool} viewport={viewport} setViewport={setViewport}
          strokeWidth={strokeWidth}
          selectedPhotoId={selectedPhotoId} setSelectedPhotoId={setSelectedPhotoId}
          onPhotoDoubleClick={(p) => setLightbox(p.id)}
          onStlDoubleClick={(m) => setStlLightbox(m.id)}
          onPhotoContextMenu={(photo, x, y) => setContextMenu({ photoId: photo.id, x, y })}
          onAnalyzeCeph={(photo) => openCephAnalysis(photo)}
          previewRotation={previewRotation}
          updatePhotoDiagnostic={updatePhotoDiagnostic}
          deletePhotoDiagnostic={deletePhotoDiagnostic}
        />

        <header className={`absolute top-0 left-0 right-0 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between
                           pointer-events-none z-20
                           ${dark ? 'bg-gradient-to-b from-neutral-950/95 to-neutral-950/0'
                                  : 'bg-gradient-to-b from-stone-50/95 to-stone-50/0'}`}>
          <div className="pointer-events-auto flex items-center gap-3">
            <svg width="52" height="52" viewBox="0 0 48 48" fill="none" style={{ flexShrink:0 }}>
              <rect width="48" height="48" rx="10" fill="#39bff0"/>
              <rect x="11" y="11" width="10" height="10" rx="2.5" fill="white" opacity="0.95"/>
              <rect x="27" y="11" width="10" height="10" rx="2.5" fill="white" opacity="0.4"/>
              <rect x="11" y="27" width="10" height="10" rx="2.5" fill="white" opacity="0.4"/>
              <rect x="27" y="27" width="10" height="10" rx="2.5" fill="white" opacity="0.95"/>
              <line x1="16" y1="21" x2="16" y2="27" stroke="white" strokeWidth="1.5" opacity="0.5"/>
              <line x1="32" y1="21" x2="32" y2="27" stroke="white" strokeWidth="1.5" opacity="0.5"/>
            </svg>
            <div>
              <h1 className={`font-display text-2xl leading-none tracking-tight
                             ${dark ? 'text-neutral-50' : 'text-neutral-900'}`}>
                Ortho<span style={{ color: '#39bff0' }}>Board</span>
              </h1>
              <p className={`text-[10px] tracking-[0.18em] uppercase mt-1 font-medium
                            ${dark ? 'text-neutral-500' : 'text-neutral-400'}`}>
                Treatment Planning Workspace
              </p>
            </div>
          </div>
          <div className="pointer-events-auto flex items-center gap-2">
            <button onClick={() => guardNavigation(() => setShowDashboard(true))}
              title="Cases dashboard"
              className={`px-3 py-1.5 rounded-md flex items-center gap-2 shadow-sm transition-all
                         ${dark ? 'bg-neutral-900/80 backdrop-blur border border-neutral-800 hover:bg-neutral-800 text-neutral-300'
                                : 'bg-white/80 backdrop-blur border border-neutral-200 hover:bg-neutral-50 text-neutral-700'}`}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
              <span className="text-[10px] tracking-[0.15em] uppercase font-medium hidden sm:inline">Cases</span>
            </button>
            <button onClick={undo}
              disabled={historyRef.current.length === 0}
              title="Undo (⌘Z)"
              className={`px-3 py-1.5 rounded-md flex items-center gap-2 shadow-sm transition-all
                         disabled:opacity-30 disabled:cursor-not-allowed
                         ${dark ? 'bg-neutral-900/80 backdrop-blur border border-neutral-800 hover:bg-neutral-800 text-neutral-300'
                                : 'bg-white/80 backdrop-blur border border-neutral-200 hover:bg-neutral-50 text-neutral-700'}`}>
              <IconUndo size={14} />
              <span className="text-[10px] tracking-[0.15em] uppercase font-medium hidden sm:inline">Undo</span>
            </button>
            <ThemeToggle />
            <StatChip label="Photos" value={photos.length} />
          </div>
        </header>

        <Toolbar
          tool={tool} setTool={setTool}
          strokeWidth={strokeWidth} setStrokeWidth={setStrokeWidth}
          onDiagnosticClick={() => setShowDiagPanel(v => !v)}
          diagActive={showDiagPanel}
          onFit={fitView} onClear={clearAll}
        />

        {showDiagPanel && (
          <DiagnosticPanel
            selectedPhoto={selectedPhoto}
            onAdd={(toolDef) => {
              if (!selectedPhoto) {
                alert('Select a photo first to attach a diagnostic tool.');
                return;
              }
              addDiagnosticToPhoto(selectedPhoto.id, toolDef);
              setShowDiagPanel(false);
            }}
            onClose={() => setShowDiagPanel(false)}
          />
        )}

        {selectedPhoto && !cropTarget && !lightbox && (
          <PhotoActionBar
            photo={selectedPhoto}
            onRotateLeft={() => rotateBy(selectedPhoto.id, -90)}
            onRotateRight={() => rotateBy(selectedPhoto.id, 90)}
            onFlipH={() => flipH(selectedPhoto.id)}
            onFlipV={() => flipV(selectedPhoto.id)}
            onCrop={() => setCropTarget(selectedPhoto)}
            onDelete={() => deletePhoto(selectedPhoto.id)}
            onClose={() => setSelectedPhotoId(null)}
          />
        )}

        <Sidebar open={sidebarOpen} setOpen={setSidebarOpen}
                 photos={photos} onUploadClick={() => fileInputRef.current?.click()}
                 caseName={caseName} setCaseName={setCaseName}
                 patientInfo={patientInfo} setPatientInfo={setPatientInfo}
                 onSave={saveCase}
                 onLoad={() => loadInputRef.current?.click()}
                 onBackToDashboard={() => guardNavigation(() => setShowDashboard(true))} />

        <input ref={fileInputRef} type="file" accept="image/*,.stl" multiple className="hidden"
               onChange={(e) => handleFiles([...e.target.files])} />
        <input ref={loadInputRef} type="file" accept=".json,application/json" className="hidden"
               onChange={(e) => { if (e.target.files[0]) loadCase(e.target.files[0]); e.target.value = ''; }} />

        <ZoomControls viewport={viewport} setViewport={setViewport} />

        {lightbox && (
          <Lightbox
            photo={photos.find(p => p.id === lightbox)}
            onClose={() => setLightbox(null)}
            onRotateLeft={() => rotateBy(lightbox, -90)}
            onRotateRight={() => rotateBy(lightbox, 90)}
            onRotateDegrees={(deg) => rotateDegrees(lightbox, deg)}
            onFlipH={() => flipH(lightbox)}
            onFlipV={() => flipV(lightbox)}
            onCrop={() => { setCropTarget(photos.find(p => p.id === lightbox)); setLightbox(null); }}
            onAddDiag={(toolDef) => addDiagnosticToPhoto(lightbox, toolDef)}
            updatePhotoDiagnostic={updatePhotoDiagnostic}
            deletePhotoDiagnostic={deletePhotoDiagnostic}
            onSaveMeasures={(ms) => updatePhoto(lightbox, { measures: ms })}
          />
        )}

        {stlLightbox && (() => {
          const model = stlModels.find(m => m.id === stlLightbox);
          if (!model) return null;
          return (
            <STLLightbox
              model={model}
              onClose={() => setStlLightbox(null)}
            />
          );
        })()}

        {cropTarget && (
          <CropModal photo={cropTarget} onCancel={() => setCropTarget(null)}
                     onDone={(src, ratio) => handleCropDone(cropTarget.id, src, ratio)} />
        )}

        {contextMenu && (() => {
          const photo = photos.find(p => p.id === contextMenu.photoId);
          if (!photo) return null;
          return (
            <PhotoContextMenu
              photo={photo}
              x={contextMenu.x} y={contextMenu.y}
              onClose={() => setContextMenu(null)}
              onToggleCeph={() => { toggleLateralCeph(photo.id); setContextMenu(null); }}
              onAnalyzeCeph={() => openCephAnalysis(photo)}
              onDelete={() => { deletePhoto(photo.id); setContextMenu(null); }}
              onSavePhoto={() => {
                const a = document.createElement('a');
                a.href = photo.src;
                const ext = (photo.src.match(/^data:image\/(\w+)/) || [,'png'])[1];
                const safe = (caseName || 'photo').replace(/[^a-z0-9]+/gi, '_').toLowerCase();
                a.download = `${safe}_${photo.category}_${photo.id.slice(0,4)}.${ext}`;
                a.click();
                setContextMenu(null);
              }}
            />
          );
        })()}

        {cephModal && (
          <CephAnalysisModal
            photo={cephModal}
            onClose={() => setCephModal(null)}
          />
        )}
      </div>
    </ThemeContext.Provider>
  );
}

  const { dark, setDark } = React.useContext(ThemeContext);
  return (
    <button onClick={() => setDark(!dark)}
      title={dark ? 'Light mode' : 'Dark mode'}
      className={`relative w-14 h-7 rounded-full transition-colors flex items-center px-0.5
        ${dark ? 'bg-neutral-800 border border-neutral-700'
               : 'bg-neutral-200 border border-neutral-300'}`}>
      <div className={`w-6 h-6 rounded-full transition-all duration-300 flex items-center justify-center
        ${dark ? 'translate-x-7 bg-neutral-100 text-neutral-900'
               : 'translate-x-0 bg-white text-neutral-700 shadow-sm'}`}>
