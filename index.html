function ZoomControls({ viewport, setViewport }) {
  const { dark } = React.useContext(ThemeContext);
  const animateZoom = (factor) => {
    const start = viewport.zoom;
    const end = Math.max(0.05, Math.min(8, start * factor));
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const wx = (cx - viewport.x) / start;
    const wy = (cy - viewport.y) / start;
    const dur = 220;
    const t0 = performance.now();
    const tick = (t) => {
      const k = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      const z = start + (end - start) * eased;
      setViewport({ x: cx - wx * z, y: cy - wy * z, zoom: z });
      if (k < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  };
  return (
    <div className={`absolute bottom-6 right-6 rounded-lg flex items-center shadow-sm font-mono text-xs z-20 overflow-hidden
                    ${dark ? 'bg-neutral-900 border border-neutral-800 text-neutral-300'
                           : 'bg-white border border-neutral-200 text-neutral-600'}`}>
      <button onClick={() => animateZoom(0.8)}
              className={`px-3 py-2 transition-colors
                        ${dark ? 'hover:bg-neutral-800 hover:text-neutral-100'
                               : 'hover:bg-neutral-100 hover:text-neutral-900'}`}>−</button>
      <span className={`px-2 py-2 border-x tabular-nums w-14 text-center font-medium
                       ${dark ? 'border-neutral-800' : 'border-neutral-200'}`}>
        {Math.round(viewport.zoom * 100)}%
      </span>
      <button onClick={() => animateZoom(1.25)}
              className={`px-3 py-2 transition-colors
                        ${dark ? 'hover:bg-neutral-800 hover:text-neutral-100'
                               : 'hover:bg-neutral-100 hover:text-neutral-900'}`}>+</button>
    </div>
  );
}

function strokeToPath(stroke) {
  if (!stroke?.points?.length) return '';
  const [first, ...rest] = stroke.points;
  return `M ${first.x} ${first.y} ` + rest.map(p => `L ${p.x} ${p.y}`).join(' ');
}

  };

  const filtered = cases.filter(c =>
    !search || c.name.toLowerCase().includes(search.toLowerCase())
  );

  // ── Refresh case list ────────────────────────────────────
  const refresh = useCallback(async () => {
    setLoading(true);
    const list = [];

    if (folderHandle) {
      try {
        // ── Fast path: read index file ──────────────────────
        let index = null;
        try {
          const fh = await folderHandle.getFileHandle('orthoboard-index.json');
          const file = await fh.getFile();
          index = JSON.parse(await file.text());
        } catch {}

        if (index && Object.keys(index).length > 0) {
          // Index exists — build cards instantly, no full file reads
          for (const [filename, meta] of Object.entries(index)) {
            list.push({
              id: filename,
              name: meta.name,
              savedAt: meta.savedAt,
              photoCount: meta.photoCount || 0,
              peekPhotos: meta.peekPhotos || [null, null, null],
              chiefComplaint: meta.chiefComplaint || '',
              source: 'folder',
              payload: null, // loaded on demand when case is opened
              _filename: filename,
            });
          }
        } else {
          // ── Fallback: full scan (first time, or index missing) ──
          // Run all file reads in parallel
          const entries = [];
          for await (const entry of folderHandle.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.orthoboard.json')) {
              entries.push(entry);
            }
          }
          const results = await Promise.all(entries.map(async (entry) => {
            try {
              const file = await entry.getFile();
              const text = await file.text();
              const data = JSON.parse(text);
              const photos = data.state?.photos || [];
              const byCat = (cat) => photos.find(p => p.category === cat)?.src || null;
              return {
                id: entry.name,
                name: data.caseName || entry.name.replace('.orthoboard.json', ''),
                savedAt: data.savedAt || file.lastModified,
                photoCount: photos.length,
                peekPhotos: [byCat('extraoral'), byCat('intraoral'), byCat('xray')],
                chiefComplaint: data.state?.patientInfo?.chiefComplaint || '',
                source: 'folder',
                payload: data,
                _filename: entry.name,
              };
            } catch { return null; }
          }));
          results.filter(Boolean).forEach(r => list.push(r));

          // Build index from scan so next load is fast
          const newIndex = {};
          list.forEach(c => {
            newIndex[c._filename] = {
              name: c.name, savedAt: c.savedAt, photoCount: c.photoCount,
              peekPhotos: c.peekPhotos, chiefComplaint: c.chiefComplaint,
            };
          });
          // Generate thumbnails for index in background
          (async () => {
            for (const c of list) {
              const thumbs = await Promise.all((c.peekPhotos || []).map(src => {
                if (!src) return Promise.resolve(null);
                return new Promise(resolve => {
                  const img = new Image();
                  img.onload = () => {
                    const cv = document.createElement('canvas');
                    cv.width = 80; cv.height = 110;
                    const ctx = cv.getContext('2d');
                    const ratio = img.width / img.height;
                    const tr = 80 / 110;
                    let sx = 0, sy = 0, sw = img.width, sh = img.height;
                    if (ratio > tr) { sw = img.height * tr; sx = (img.width - sw) / 2; }
                    else { sh = img.width / tr; sy = (img.height - sh) / 2; }
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 80, 110);
                    resolve(cv.toDataURL('image/jpeg', 0.5));
                  };
                  img.onerror = () => resolve(null);
                  img.src = src;
                });
              }));
              newIndex[c._filename].peekPhotos = thumbs;
            }
            try {
              const fh = await folderHandle.getFileHandle('orthoboard-index.json', { create: true });
              const w = await fh.createWritable();
              await w.write(JSON.stringify(newIndex));
              await w.close();
            } catch {}
          })();

                 boxShadow: dark
                   ? '0 12px 40px -12px rgba(236,72,153,0.30), inset 0 1px 0 rgba(255,255,255,0.06)'

                              ${dark ? 'text-pink-300' : 'text-pink-700'}`}>Today</div>

                   style={{ background: 'linear-gradient(135deg, #ec4899, #db2777)' }}>

              <div className={`text-[10px] tracking-[0.12em] uppercase font-medium mb-3
                              ${dark ? 'text-neutral-500' : 'text-neutral-400'}`}>Cases folder</div>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EF9F27" strokeWidth="1.6" strokeLinecap="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                  </svg>
                  <div>

                <div className="flex gap-2">
                  {hasFileSystemAccess && (
                    <button onClick={onChooseFolder}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors

                  )}
                  {folderHandle && (
                    <button onClick={() => { onForgetFolder(); setFolderPanelOpen(false); }}
                      className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors
                                 ${dark ? 'text-neutral-500 hover:text-neutral-200' : 'text-neutral-400 hover:text-neutral-700'}`}>
                      Disconnect
                    </button>
                  )}
                </div>
              </div>
            </div>

        </div>

        {/* Cases label + view toggle */}
        <div className="flex items-center justify-between mt-5 mb-4">

            <div className={`text-[10px] tracking-[0.15em] uppercase font-medium ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>All cases</div>
            <div className={`text-[11px] font-mono ${dark ? 'text-neutral-500' : 'text-neutral-400'}`}>{filtered.length} {filtered.length === 1 ? 'case' : 'cases'}</div>
          </div>
          {/* View toggle */}
          <div className="flex items-center rounded-lg p-0.5"
               style={{
                 background: dark ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.6)',
                 backdropFilter: 'blur(20px)',
                 WebkitBackdropFilter: 'blur(20px)',
                 border: dark ? '0.5px solid rgba(255,255,255,0.08)' : '0.5px solid rgba(0,0,0,0.06)',
               }}>
            <button onClick={() => setViewMode('grid')} title="Grid view"
              className={`px-2.5 py-1.5 rounded-md transition-all flex items-center gap-1.5 text-[11px] font-medium ${viewMode === 'grid' ? (dark ? 'bg-white/10 text-white' : 'bg-white text-neutral-900 shadow-sm') : (dark ? 'text-neutral-400 hover:text-neutral-200' : 'text-neutral-500 hover:text-neutral-700')}`}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>

            </button>
            <button onClick={() => setViewMode('list')} title="List view"
              className={`px-2.5 py-1.5 rounded-md transition-all flex items-center gap-1.5 text-[11px] font-medium ${viewMode === 'list' ? (dark ? 'bg-white/10 text-white' : 'bg-white text-neutral-900 shadow-sm') : (dark ? 'text-neutral-400 hover:text-neutral-200' : 'text-neutral-500 hover:text-neutral-700')}`}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
              List
            </button>
          </div>
        </div>

        {/* Grid */}
        {loading ? (
          <div className={`text-center py-16 text-sm ${dark ? 'text-neutral-500' : 'text-neutral-400'}`}>Loading cases…</div>
        ) : filtered.length === 0 && cases.length === 0 ? (
          <div className={`text-center py-16 ${dark ? 'text-neutral-600' : 'text-neutral-400'}`}>
            <div className={`w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center ${dark ? 'bg-neutral-800' : 'bg-neutral-100'}`}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </div>

            <div className="text-xs">Click "New case" to get started, or drop a file above.</div>
          </div>
        ) : viewMode === 'grid' ? (
          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
            {filtered.map(c => (
              <CaseFolder key={c.id} caseItem={c} dark={dark}
                onOpen={() => openCase(c)}
                onDelete={(e) => handleDelete(c, e)}
                fmtDate={fmtDate} />
            ))}
            <button onClick={onNewCase}
              className={`rounded-xl border-2 border-dashed flex flex-col items-center justify-center min-h-[200px] transition-colors
                         ${dark ? 'border-neutral-700/50 hover:border-neutral-500' : 'border-neutral-300/50 hover:border-neutral-400'}`}>
              <div className={`w-8 h-8 rounded-full flex items-center justify-center mb-2 ${dark ? 'bg-white/5' : 'bg-white/60'}`}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </div>
              <span className={`text-xs ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>New case</span>
            </button>
          </div>
        ) : (
          <CaseList cases={filtered} dark={dark}
            onOpen={openCase}
            onDelete={handleDelete}
            fmtDate={fmtDate} />
        )}
      </div>
    </div>
  );
}

// ============================================================
// CASE LIST — Linear-style table view
// ============================================================
function CaseList({ cases, dark, onOpen, onDelete, fmtDate }) {
  const dotColors = ['#fbbf24', '#10b981', '#6366f1', '#ec4899', '#06b6d4', '#f97316'];
  return (
    <div className="rounded-xl overflow-hidden"
         style={{
           background: dark ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.6)',
           backdropFilter: 'blur(20px)',
           WebkitBackdropFilter: 'blur(20px)',
           border: dark ? '0.5px solid rgba(255,255,255,0.08)' : '0.5px solid rgba(0,0,0,0.06)',
         }}>
      {/* Header row */}
      <div className={`grid items-center gap-3 px-4 py-2.5 text-[10px] font-mono tracking-wider uppercase
                      ${dark ? 'text-neutral-500 border-b border-white/5' : 'text-neutral-400 border-b border-black/5'}`}
           style={{ gridTemplateColumns: '20px 1fr 120px 80px 80px 32px' }}>
        <div></div>
        <div>Name</div>
        <div>Saved</div>
        <div>Photos</div>
        <div>Size</div>
        <div></div>
      </div>
      {/* Rows */}
      {cases.map((c, i) => {
        const photoCount = (c.peekPhotos?.length || 0) + (c.totalPhotos || 0);
        const sizeKb = c.size ? Math.round(c.size / 1024) : null;
        return (
          <div key={c.id}
               onClick={() => onOpen(c)}
               className={`grid items-center gap-3 px-4 py-3 cursor-pointer transition-colors group
                          ${dark ? 'hover:bg-white/5 border-b border-white/5' : 'hover:bg-black/[0.02] border-b border-black/5'}
                          ${i === cases.length - 1 ? 'border-b-0' : ''}`}
               style={{ gridTemplateColumns: '20px 1fr 120px 80px 80px 32px' }}>
            <div style={{
              width: 7, height: 7, borderRadius: '50%',
              background: dotColors[i % dotColors.length],
              boxShadow: `0 0 8px ${dotColors[i % dotColors.length]}80`,
            }}></div>
            <div className={`text-sm font-medium truncate ${dark ? 'text-neutral-100' : 'text-neutral-900'}`}>{c.name}</div>
            <div className={`text-xs font-mono ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>{fmtDate(c.savedAt)}</div>
            <div className={`text-xs font-mono ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>{photoCount || '—'}</div>
            <div className={`text-xs font-mono ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>{sizeKb ? `${sizeKb} KB` : '—'}</div>
            <button onClick={(e) => { e.stopPropagation(); onDelete(c, e); }}
                    className={`opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded
                              ${dark ? 'text-neutral-500 hover:text-red-400' : 'text-neutral-400 hover:text-red-500'}`}
                    title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// CASE FOLDER — 3D animated folder card
// ============================================================
function CaseFolder({ caseItem: c, dark, onOpen, onDelete, fmtDate }) {
  const [hovered, setHovered] = useState(false);
  const peeks = c.peekPhotos || [];

  // Flat color placeholders for missing photos
  const PLACEHOLDER = (label, bg, tc) => `data:image/svg+xml;utf8,${encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 82'>
      <rect width='60' height='82' fill='${bg}' rx='4'/>
      <text x='30' y='46' font-size='8' font-family='sans-serif' fill='${tc}' text-anchor='middle' opacity='0.85'>${label}</text>
    </svg>`
  )}`;
  const cards = [
    peeks[0] || PLACEHOLDER('Extra-oral', '#FFF3D6', '#854F0B'),
    peeks[1] || PLACEHOLDER('Intra-oral', '#D6F5E8', '#0F6E56'),
    peeks[2] || PLACEHOLDER('X-ray',      '#D6E8FB', '#185FA5'),
  ];

  // Clipboard SVG colors
  const cbFill   = dark ? '#2a2a2a' : '#F5F3F0';
  const cbStroke = dark ? '#444' : '#D4D0CB';
  const cbClip   = dark ? '#444' : '#D4D0CB';
  const cbClip2  = dark ? '#555' : '#B8B4AE';
  const cbLine   = dark ? '#383838' : '#E0DDD8';

  // Photo stack resting angles/positions — stacked on clipboard
  const restTransforms = [
    'translate(0px, 0px) rotate(-5deg) scale(0.9)',
    'translate(0px, 0px) rotate(3deg) scale(0.9)',
    'translate(0px, 0px) rotate(0deg) scale(0.9)',
  ];
  const fanTransforms = [
    'translate(-65px, -15px) rotate(-12deg) scale(1)',
    'translate(0px,   -80px) rotate(0deg)   scale(1)',
    'translate(65px,  -15px) rotate(12deg)  scale(1)',
  ];

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}

// ============================================================
// STL RENDERER — Three.js WebGL canvas, manual orbit controls
// ============================================================
const STLRenderer = React.forwardRef(function STLRenderer({ model, width, height, style = {}, measureMode = false }, ref) {
  const canvasRef = useRef(null);
  const stateRef  = useRef({});

  const updateCamera = useCallback(() => {
    const s = stateRef.current;
    if (!s.camera) return;
    s.camera.position.x = s.radius * Math.sin(s.phi) * Math.sin(s.theta);
    s.camera.position.y = s.radius * Math.cos(s.phi);
    s.camera.position.z = s.radius * Math.sin(s.phi) * Math.cos(s.theta);
    s.camera.lookAt(0, 0, 0);
  }, []);

  React.useImperativeHandle(ref, () => ({
    setDisplayMode: (mode) => {
      const s = stateRef.current;
      if (!s.mesh) return;
      if (mode === 'solid')     { s.mesh.visible=true; s.wireMesh.visible=false; s.mat.transparent=false; s.mat.opacity=1; }
      if (mode === 'wireframe') { s.mesh.visible=false; s.wireMesh.visible=true; }
      if (mode === 'xray')      { s.mesh.visible=true; s.wireMesh.visible=false; s.mat.transparent=true; s.mat.opacity=0.3; }
    },
    resetView: () => {
      const s = stateRef.current;
      s.phi=Math.PI/6; s.theta=Math.PI/4; s.radius=s.maxDim*2; updateCamera();
    },
    setView: (phi, theta) => {
      const s = stateRef.current; s.phi=phi; s.theta=theta; updateCamera();
    },
    getRenderer: () => stateRef.current.renderer,
    getScene: () => stateRef.current,   // exposes { scene, camera, mesh, renderer }
    raycast: (clientX, clientY) => {
      const s = stateRef.current;
      if (!s.camera || !s.mesh || !canvasRef.current) return null;
      const THREE = window.THREE;
      const rect = canvasRef.current.getBoundingClientRect();
      const nx = ((clientX - rect.left) / rect.width)  *  2 - 1;
      const ny = ((clientY - rect.top)  / rect.height) * -2 + 1;
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera({ x: nx, y: ny }, s.camera);
      const hits = raycaster.intersectObject(s.mesh);
      return hits.length > 0 ? hits[0].point : null;
    },
    addMeasureLine: (p1, p2) => {
      const s = stateRef.current;
      if (!s.scene) return;
      const THREE = window.THREE;
      // Remove old measure line if exists
      const old = s.scene.getObjectByName('__measureLine');
      if (old) s.scene.remove(old);
      const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
      const mat = new THREE.LineBasicMaterial({ color: 0x06b6d4, linewidth: 3 });
      const line = new THREE.Line(geo, mat);
      line.name = '__measureLine';
      s.scene.add(line);
      // Add endpoint spheres
      ['__mSphere1','__mSphere2'].forEach(n => { const o = s.scene.getObjectByName(n); if(o) s.scene.remove(o); });
      [p1,p2].forEach((p,i) => {
        const sg = new THREE.SphereGeometry(s.maxDim*0.012, 12, 12);
        const sm = new THREE.MeshBasicMaterial({ color: 0x06b6d4 });
        const sp = new THREE.Mesh(sg, sm);
        sp.position.copy(p);
        sp.name = i === 0 ? '__mSphere1' : '__mSphere2';
        s.scene.add(sp);
      });
    },
    clearMeasure: () => {
      const s = stateRef.current;
      if (!s.scene) return;
      ['__measureLine','__mSphere1','__mSphere2'].forEach(n => { const o = s.scene.getObjectByName(n); if(o) s.scene.remove(o); });
    },
  }), [updateCamera]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !model?.verts) return;

    const THREE = window.THREE;
    if (!THREE) return;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.01, 10000);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(1, 2, 3);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
    dir2.position.set(-1, -1, -1);
    scene.add(ambient, dir1, dir2);

    // Geometry
    const geo = new THREE.BufferGeometry();
    const verts = new Float32Array(model.verts);
    geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geo.computeVertexNormals();

    // Center + scale
    geo.computeBoundingBox();
    const box = geo.boundingBox;
    const center = new THREE.Vector3();
    box.getCenter(center);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    geo.translate(-center.x, -center.y, -center.z);

    const mat = new THREE.MeshPhongMaterial({
      color: model.color || '#9ca3af',
      shininess: 40,
      side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    // Wireframe overlay (hidden by default)
    const wireMat = new THREE.MeshBasicMaterial({ color: 0x374151, wireframe: true, opacity: 0.15, transparent: true });
    const wireMesh = new THREE.Mesh(geo, wireMat);
    wireMesh.visible = false;
    scene.add(wireMesh);

    camera.position.z = maxDim * 2;

    stateRef.current = {
      renderer, scene, camera, mesh, wireMesh, mat,
      phi: Math.PI / 6, theta: Math.PI / 4,
      radius: maxDim * 2, maxDim,
      displayMode: 'solid',
    };

    updateCamera();

    // Animate
    let raf;
    const animate = () => {
      raf = requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(raf);
      renderer.dispose();
      geo.dispose();
      mat.dispose();
    };
  }, [model?.id, width, height]);

  // Update color when model color changes
  useEffect(() => {
    const s = stateRef.current;
    if (s.mat) s.mat.color.set(model.color || '#9ca3af');
  }, [model?.color]);

  const orbitRef = useRef(null);
  const onPointerDown = (e) => {
    if (measureMode) return; // let parent handle pointer events for raycasting
    e.stopPropagation();
    orbitRef.current = { x: e.clientX, y: e.clientY, phi: stateRef.current.phi, theta: stateRef.current.theta };
    const onMove = (ev) => {
      const dx = ev.clientX - orbitRef.current.x;
      const dy = ev.clientY - orbitRef.current.y;
      stateRef.current.theta = orbitRef.current.theta + dx * 0.01;
      stateRef.current.phi = orbitRef.current.phi - dy * 0.01;
      updateCamera();
    };
    const onUp = () => { window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp); };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  const onWheel = (e) => {
    e.preventDefault();
    const s = stateRef.current;
    s.radius = Math.max(s.maxDim * 0.3, Math.min(s.maxDim * 10, s.radius * (1 + e.deltaY * 0.001)));
    updateCamera();
  };

  return (
    <canvas ref={canvasRef} width={width} height={height}
      style={{ display:'block', cursor: measureMode ? 'crosshair' : 'grab', borderRadius: 8,
               pointerEvents: measureMode ? 'none' : 'auto', ...style }}
      onPointerDown={onPointerDown}
      onWheel={onWheel} />
  );
});

// ============================================================
// STL ITEM — whiteboard card
// ============================================================
function STLItem({ model, viewportZoom, tool, onPointerDown, onMove, onResize, onDoubleClick, onDelete }) {
  const { dark } = React.useContext(ThemeContext);
  const lastPos = useRef(null);
  const isDragging = useRef(false);

  const handlePointerDown = (e) => {
    if (tool !== 'select' && tool !== 'pan') return;
    e.stopPropagation();
    lastPos.current = { x: e.clientX, y: e.clientY };
    isDragging.current = false;
    const onMove_ = (ev) => {
      const dx = ev.clientX - lastPos.current.x;
      const dy = ev.clientY - lastPos.current.y;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) isDragging.current = true;
      onMove(dx, dy);
      lastPos.current = { x: ev.clientX, y: ev.clientY };
    };
    const onUp_ = () => {
      window.removeEventListener('pointermove', onMove_);
      window.removeEventListener('pointerup', onUp_);
    };
    window.addEventListener('pointermove', onMove_);
    window.addEventListener('pointerup', onUp_);
  };

  return (
    <div className="absolute group"
         style={{ left: model.x, top: model.y, width: model.w, height: model.h }}
         onPointerDown={handlePointerDown}
         onDoubleClick={onDoubleClick}>
      <div className={`w-full h-full rounded-xl overflow-hidden shadow-lg border relative
                      ${dark ? 'border-neutral-700 bg-neutral-900' : 'border-neutral-200 bg-white'}`}>
        {window.THREE ? (
          <STLRenderer model={model} width={model.w} height={model.h - 32}
            style={{ width: '100%', height: model.h - 32 }} />
        ) : (
          <div className="w-full h-full flex items-center justify-center">
            <span className="text-xs text-neutral-400">Loading 3D…</span>
          </div>
        )}
        {/* Footer */}
        <div className={`absolute bottom-0 left-0 right-0 h-8 flex items-center justify-between px-3
                        ${dark ? 'bg-neutral-900/90 border-t border-neutral-800' : 'bg-white/90 border-t border-neutral-100'}`}>
          <span className={`text-[10px] font-medium truncate ${dark ? 'text-neutral-400' : 'text-neutral-500'}`}>
            📐 {model.name}
          </span>
          <span className={`text-[9px] ${dark ? 'text-neutral-600' : 'text-neutral-400'}`}>
            double-click to open
          </span>
        </div>
      </div>
      {/* Resize handle */}
      <div className="absolute -bottom-2 -right-2 w-5 h-5 bg-white border-2 border-amber-400 rounded-sm
                     cursor-nwse-resize shadow-md z-10 opacity-0 group-hover:opacity-100"
           onPointerDown={(e) => {
             e.stopPropagation();
             const start = { x: e.clientX, w: model.w };
             const onM = (ev) => onResize((ev.clientX - start.x));
             const onU = () => { window.removeEventListener('pointermove', onM); window.removeEventListener('pointerup', onU); };
             window.addEventListener('pointermove', onM);
             window.addEventListener('pointerup', onU);
           }} />
      {/* Delete */}
      <button className="absolute top-1 right-1 w-6 h-6 rounded-full bg-black/50 text-white
                        opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center
                        hover:bg-red-500 z-10"
              onPointerDown={(e) => e.stopPropagation()}
              onClick={(e) => { e.stopPropagation(); onDelete(); }}>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  );
}

// ============================================================
// STL LIGHTBOX — full view with action bar
// ============================================================
function STLLightbox({ model, onClose }) {
  const W = window.innerWidth  * 0.92;
  const H = window.innerHeight * 0.85;

  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-50 bg-neutral-950/96 backdrop-blur-sm flex items-center justify-center"
         onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>

      <button onClick={onClose}
        className="absolute top-5 right-5 w-9 h-9 rounded-lg bg-white/10 hover:bg-white/20 text-white flex items-center justify-center z-10">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div className="absolute top-5 left-6 text-white/40 text-xs tracking-[0.2em] uppercase font-mono">
        📐 {model.name}
      </div>

      <div className="rounded-xl overflow-hidden shadow-2xl" onClick={(e) => e.stopPropagation()}>
        {window.THREE ? (
          <STLRenderer model={model} width={W} height={H} />
        ) : (
          <div style={{ width: W, height: H }} className="flex items-center justify-center bg-neutral-900 rounded-xl">
            <span className="text-neutral-400 text-sm">Loading Three.js…</span>
          </div>
        )}
      </div>

      <div className="absolute bottom-5 left-1/2 -translate-x-1/2 text-white/30 text-[11px] font-mono tracking-wider">
        Drag to rotate · Scroll to zoom · ESC to close
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
